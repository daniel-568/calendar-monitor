name: Monitor Nader Appointments

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:         # manual trigger from GitHub UI

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run monitor
        env:
          CI: true
          APPOINTMENT_URL: ${{ secrets.APPOINTMENT_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          FIRST_NAME: ${{ secrets.FIRST_NAME }}
          LAST_NAME: ${{ secrets.LAST_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          PROPOSED_GRAFTS: ${{ secrets.PROPOSED_GRAFTS }}
        run: node monitor.js

      - name: Upload booking screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-screenshots
          path: "*.png"
          if-no-files-found: ignore
          retention-days: 3

      - name: Save state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_result.json
          git diff --staged --quiet || git commit -m "chore: update last_result.json [skip ci]"
          git push
